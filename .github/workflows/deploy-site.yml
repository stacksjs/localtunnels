name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'src/ui/marketing/**'
      - 'docs/**'
      - '.config/bunpress.ts'
      - 'src/cloud/deploy-site.ts'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    name: s3-cloudfront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2.1.3

      - name: Use cached node_modules
        uses: actions/cache@v5.0.3
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install

      - name: Deploy Site
        run: bun run build:docs && bun run bin/cli.ts deploy:site --source-dir docs/.bunpress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_KEY: ${{ secrets.PORKBUN_SECRET_KEY }}

      - name: Verify deployment
        run: |
          sleep 10
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            'https://localtunnel.dev' \
            --max-time 15 2>/dev/null) || true
          echo "Health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health check returned $HTTP_CODE"
          fi
